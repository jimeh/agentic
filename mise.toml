# --- Settings ---

[settings]
lockfile = true
minimum_release_age = "3d"

[settings.npm]
bun = true

[settings.task]
run_auto_install = true

# --- Tools ---

[tools]
actionlint = "1"
bun = "1.3"
lefthook = "2"
markdownlint-cli2 = "0"
oxfmt = "0"
oxlint = "1"
pinact = "4"
shellcheck = "0"
zizmor = "1"
"github:jimeh/treeboot" = "0"

# --- Tasks ---

# Setup and dependencies

[tasks.setup]
description = "Install dependencies and local git hooks"
run = ["mise run deps:install", "mise run hooks:install"]

[tasks."setup:ci"]
description = "Install dependencies from the lockfile for CI"
run = "mise run deps:install:ci"

[tasks."deps:install"]
description = "Install project dependencies"
run = "bun install"

[tasks."deps:install:ci"]
description = "Install project dependencies from the lockfile"
run = "bun install --frozen-lockfile"

[tasks."hooks:install"]
description = "Install Lefthook git hooks"
run = "lefthook install --reset-hooks-path"

# Agent configuration

[tasks."agent-config:install"]
description = "Install agent config symlinks and configured plugins"
run = "bun packages/agent-config/bin/agent-config.ts install"

[tasks."agent-config:force"]
description = "Replace installed agent config symlinks after backing them up"
run = "bun packages/agent-config/bin/agent-config.ts install --force"

[tasks."agent-config:dry-run"]
description = "Preview agent config installation"
run = "bun packages/agent-config/bin/agent-config.ts install --dry-run"

[tasks."agent-config:schema:build"]
description = "Generate the agent config JSON schema"
run = "bun packages/agent-config/bin/agent-config.ts schema build"

[tasks."agent-config:schema:check"]
description = "Check the agent config JSON schema is up to date"
run = "bun packages/agent-config/bin/agent-config.ts schema check"

# Generated global rules

[tasks."rules:build"]
description = "Render global rule files from base and target overlays"
run = "bun packages/agent-config/bin/agent-config.ts rules build"

[tasks."rules:check"]
description = "Check rendered global rule files are up to date"
run = "bun packages/agent-config/bin/agent-config.ts rules check"

# Vendored third-party skills

[tasks."thirdparty:add-skills"]
description = "Add selected upstream skills to the third-party manifest"
run = "bun packages/vendor-skills/bin/vendor-skills.ts add"

[tasks."thirdparty:update-skills"]
description = "Update vendored third-party skills from manifest sources"
run = "bun packages/vendor-skills/bin/vendor-skills.ts update"

[tasks."thirdparty:update-skills:dry-run"]
description = "Preview vendored third-party skill updates"
run = "bun packages/vendor-skills/bin/vendor-skills.ts update --dry-run"

[tasks."thirdparty:update-skills:check"]
description = "Check vendored third-party skills against upstream"
run = "bun packages/vendor-skills/bin/vendor-skills.ts check"

# GitHub Actions

[tasks."actions:update"]
description = "Update and pin GitHub Actions with Pinact"
run = "pinact run --update"

# Worktree bootstrap

[tasks.treeboot]
description = "Run Treeboot worktree bootstrap"
run = "treeboot run"

[tasks."treeboot:check"]
description = "Validate Treeboot worktree bootstrap config"
run = "treeboot check"

# Quality gates

[tasks.format]
description = "Format files with configured formatters"
depends = ["format:oxfmt"]

[tasks."format:check"]
description = "Check file formatting"
depends = ["format:oxfmt:check"]

[tasks.lint]
description = "Run all lint and harness checks"
depends = [
  "lint:oxlint",
  "lint:markdownlint",
  "lint:shell",
  "agent-config:schema:check",
  "rules:check",
  "treeboot:check",
  "lint:agent-harness",
  "lint:workflows",
]

[tasks.check]
description = "Run fast local confidence checks"
depends = ["format:check", "lint", "typecheck"]

[tasks.test]
description = "Run all tests"
run = ["mise run test:unit", "mise run test:plugins"]

[tasks."test:unit"]
description = "Run Bun unit tests"
run = "bun test packages/*/src"

[tasks."test:plugins"]
description = "Run plugin shell tests"
run = "bun packages/agent-config/bin/agent-config.ts test plugins"

[tasks.verify]
description = "Run lint and tests"
depends = ["check", "test"]

[tasks.typecheck]
description = "Type-check TypeScript with oxlint"
run = "oxlint --type-aware --type-check --no-error-on-unmatched-pattern ."

# Formatting subtasks

[tasks."format:oxfmt"]
description = "Format files with oxfmt"
run = "oxfmt --no-error-on-unmatched-pattern"

[tasks."format:oxfmt:check"]
description = "Check formatting with oxfmt"
run = "oxfmt --check --no-error-on-unmatched-pattern"

# Linting subtasks

[tasks."lint:oxlint"]
description = "Lint TypeScript with oxlint"
run = "oxlint --no-error-on-unmatched-pattern ."

[tasks."lint:markdownlint"]
description = "Lint markdown files with markdownlint"
run = "markdownlint-cli2 '**/*.md'"

[tasks."lint:shell"]
description = "Lint shell scripts with shellcheck"
run = "bash -lc 'shopt -s globstar nullglob; shellcheck ./**/*.sh'"

[tasks."lint:agent-harness"]
description = "Check agent skill and plugin metadata invariants"
run = "bun packages/agent-config/bin/agent-config.ts check harness"

[tasks."lint:workflows"]
description = "Check GitHub Actions syntax and security posture"
run = ["actionlint", "zizmor --pedantic .github/workflows"]
