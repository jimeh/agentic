interface:
  display_name: "Ship Feature PR"
  short_description: "Reuse or plan, implement, and review a feature PR"
  default_prompt:
    "Use $ship-feature-pr to take this feature end to end: reuse any settled
    plan already in context or plan it if needed, implement it in an isolated
    worktree, open a draft PR, run one Codex and one Claude reviewer, reconcile
    the findings, and mark the PR ready."
