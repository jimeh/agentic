interface:
  display_name: "Ship Feature PR"
  short_description: "Reuse or plan, implement, and review a feature PR"
  default_prompt:
    "Use $ship-feature-pr to ship this feature from the current checkout: reuse
    or create a plan, route work to the appropriate native and foreign-engine
    channels, integrate and open the draft PR from this checkout, reuse the
    initial reviewers for fix verification, and deliver it when reviews, CI, and
    local handback pass."
