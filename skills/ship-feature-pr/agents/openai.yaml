interface:
  display_name: "Ship Feature PR"
  short_description: "Reuse or plan, implement, and review a feature PR"
  default_prompt:
    "Use $ship-feature-pr to take this feature end to end: reuse any settled
    plan already in context or plan it if needed, preserve and return the final
    branch to the invocation checkout, prefer native task tooling and an
    isolated worktree, fall back to the same-engine CLI when native tooling is
    unavailable or insufficient, allow direct implementation for small changes,
    open a draft PR, run native and foreign-engine reviews, reconcile the
    findings, and mark the PR ready."
